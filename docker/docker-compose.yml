services:
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  client:
    build:
      context: ..
      dockerfile: docker/client.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
